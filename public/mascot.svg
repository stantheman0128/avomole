<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="戴眼鏡的酪梨騎在鼴鼠背上">
  <defs>
    <clipPath id="fleshClip">
      <path d="M200 96 C154 96 128 138 128 190 C128 246 160 292 200 292 C240 292 272 246 272 190 C272 138 246 96 200 96 Z"/>
    </clipPath>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="200" cy="360" rx="150" ry="20" fill="#2E4A1F" opacity="0.12"/>

  <!-- ===== MOLE ===== -->
  <!-- back legs -->
  <ellipse cx="122" cy="342" rx="20" ry="13" fill="#7C5433"/>
  <ellipse cx="288" cy="342" rx="20" ry="13" fill="#7C5433"/>
  <!-- body -->
  <path d="M96 322 C96 288 132 268 200 268 C268 268 306 288 306 322 C306 352 262 366 200 366 C138 366 96 352 96 322 Z" fill="#9C6B3F"/>
  <!-- belly highlight -->
  <path d="M132 330 C132 312 160 300 200 300 C240 300 268 312 268 330 C268 348 240 356 200 356 C160 356 132 348 132 330 Z" fill="#B78455"/>
  <!-- front paws -->
  <ellipse cx="150" cy="360" rx="16" ry="11" fill="#7C5433"/>
  <ellipse cx="250" cy="360" rx="16" ry="11" fill="#7C5433"/>
  <!-- little claws -->
  <g fill="#F8F6EC">
    <circle cx="142" cy="363" r="2.4"/><circle cx="150" cy="365" r="2.4"/><circle cx="158" cy="363" r="2.4"/>
    <circle cx="242" cy="363" r="2.4"/><circle cx="250" cy="365" r="2.4"/><circle cx="258" cy="363" r="2.4"/>
  </g>
  <!-- mole snout -->
  <ellipse cx="308" cy="316" rx="30" ry="24" fill="#9C6B3F"/>
  <ellipse cx="330" cy="316" rx="12" ry="10" fill="#7C5433"/>
  <ellipse cx="336" cy="316" rx="5" ry="6" fill="#4A3320"/>
  <!-- nose whiskers -->
  <g stroke="#4A3320" stroke-width="1.6" stroke-linecap="round">
    <line x1="330" y1="308" x2="352" y2="300"/>
    <line x1="332" y1="316" x2="356" y2="316"/>
    <line x1="330" y1="324" x2="352" y2="332"/>
  </g>
  <!-- mole eye (content, squinty) -->
  <path d="M292 302 q6 -5 12 0" stroke="#4A3320" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  <!-- mole ear tuft -->
  <path d="M150 276 q6 -14 16 -6" stroke="#7C5433" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- ===== AVOCADO (rider) ===== -->
  <!-- little arms holding on -->
  <path d="M150 234 q-14 18 -6 40" stroke="#2E4A1F" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M252 234 q14 18 6 40" stroke="#2E4A1F" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- avocado outer skin -->
  <path d="M200 96 C154 96 128 138 128 190 C128 246 160 292 200 292 C240 292 272 246 272 190 C272 138 246 96 200 96 Z" fill="#2E4A1F"/>
  <!-- flesh -->
  <g clip-path="url(#fleshClip)">
    <path d="M200 110 C164 110 144 146 144 190 C144 240 170 278 200 278 C230 278 256 240 256 190 C256 146 236 110 200 110 Z" fill="#6B9E3E"/>
    <!-- pale flesh ring -->
    <path d="M200 132 C176 132 162 158 162 190 C162 228 180 258 200 258 C220 258 238 228 238 190 C238 158 224 132 200 132 Z" fill="#C9DCA6"/>
    <!-- seed -->
    <circle cx="200" cy="196" r="34" fill="#9C6B3F"/>
    <circle cx="200" cy="196" r="34" fill="none" stroke="#7C5433" stroke-width="3"/>
  </g>

  <!-- glasses (over the top of the flesh/seed, on the "face") -->
  <g>
    <rect x="150" y="158" width="44" height="34" rx="10" fill="#F8F6EC" stroke="#2E4A1F" stroke-width="5"/>
    <rect x="206" y="158" width="44" height="34" rx="10" fill="#F8F6EC" stroke="#2E4A1F" stroke-width="5"/>
    <line x1="194" y1="172" x2="206" y2="172" stroke="#2E4A1F" stroke-width="5"/>
    <line x1="150" y1="168" x2="132" y2="160" stroke="#2E4A1F" stroke-width="5" stroke-linecap="round"/>
    <line x1="250" y1="168" x2="268" y2="160" stroke="#2E4A1F" stroke-width="5" stroke-linecap="round"/>
  </g>
  <!-- smart eyes behind glasses -->
  <circle cx="172" cy="175" r="6" fill="#22301A"/>
  <circle cx="228" cy="175" r="6" fill="#22301A"/>
  <circle cx="174" cy="173" r="2" fill="#F8F6EC"/>
  <circle cx="230" cy="173" r="2" fill="#F8F6EC"/>

  <!-- friendly smile -->
  <path d="M182 214 q18 16 36 0" stroke="#22301A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- cheeks -->
  <circle cx="164" cy="206" r="6" fill="#6B9E3E" opacity="0.45"/>
  <circle cx="236" cy="206" r="6" fill="#6B9E3E" opacity="0.45"/>

  <!-- tiny leaf sprout on top -->
  <path d="M200 96 C200 78 208 66 224 62 C222 80 214 92 200 96 Z" fill="#6B9E3E"/>
  <line x1="200" y1="96" x2="210" y2="74" stroke="#2E4A1F" stroke-width="2.5" stroke-linecap="round"/>
</svg>
